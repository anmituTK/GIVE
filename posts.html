<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Give 投稿管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #f5f5f5;
      padding: 1rem;
      padding-bottom: 5rem;
    }

    h1 {
      font-size: 1.2rem;
      text-align: center;
      color: #6B8EB5;
      margin-bottom: 0.5rem;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .tab {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      border: 2px solid #6B8EB5;
      background: #fff;
      color: #6B8EB5;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
    }

    .tab.active {
      background: #6B8EB5;
      color: #fff;
    }

    .post-card {
      background: #fff;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 0.8rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
    }

    .post-card.hidden {
      display: none;
    }

    .post-id {
      font-size: 0.7rem;
      color: #aaa;
      white-space: nowrap;
      padding-top: 0.2rem;
    }

    .post-body {
      flex: 1;
    }

    .post-text {
      font-size: 0.9rem;
      line-height: 1.7;
      color: #4a4a4a;
    }

    .post-url {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 0.3rem;
      word-break: break-all;
    }

    .post-tags {
      font-size: 0.8rem;
      color: #6B8EB5;
      margin-top: 0.3rem;
    }

    .copy-btn {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: none;
      background: #6B8EB5;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .copy-btn.copied {
      background: #4CAF50;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 0.7rem 1.5rem;
      border-radius: 50px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <h1>Give 投稿管理</h1>

  <div class="tabs">
    <button class="tab active" data-filter="all">すべて</button>
    <button class="tab" data-filter="A">寄り添い</button>
    <button class="tab" data-filter="B">紹介</button>
  </div>

  <div id="posts"></div>

  <div class="toast" id="toast">コピーしました</div>

  <script>
    const container = document.getElementById('posts');
    const toast = document.getElementById('toast');
    let posts = [];

    function renderPosts(filter) {
      container.innerHTML = '';
      posts.forEach(post => {
        if (filter !== 'all' && post.type !== filter) return;

        const copyText = post.url
          ? post.text + '\n' + post.url + (post.tags ? '\n\n' + post.tags : '')
          : post.text;

        const card = document.createElement('div');
        card.className = 'post-card';
        card.innerHTML = `
          <div class="post-id">${post.id}</div>
          <div class="post-body">
            <div class="post-text">${post.text}</div>
            ${post.url ? `<div class="post-url">${post.url}</div>` : ''}
            ${post.tags ? `<div class="post-tags">${post.tags}</div>` : ''}
          </div>
          <button class="copy-btn" data-copy="${encodeURIComponent(copyText)}">コピー</button>
        `;
        container.appendChild(card);
      });
    }

    // Load posts from JSON
    fetch('data/posts.json')
      .then(res => res.json())
      .then(data => {
        posts = data.posts;
        renderPosts('all');
      });

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderPosts(tab.dataset.filter);
      });
    });

    // Copy handler
    container.addEventListener('click', async (e) => {
      const btn = e.target.closest('.copy-btn');
      if (!btn) return;

      const text = decodeURIComponent(btn.dataset.copy);

      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }

      btn.textContent = '済';
      btn.classList.add('copied');
      toast.classList.add('show');

      setTimeout(() => {
        btn.textContent = 'コピー';
        btn.classList.remove('copied');
        toast.classList.remove('show');
      }, 1500);
    });
  </script>

</body>
</html>
